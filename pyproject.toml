[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "ax-engine"
version = "4.8.0"
description = "Preview Python bindings for AX Engine v4"
requires-python = ">=3.10"
readme = "crates/ax-engine-py/README.md"

[project.optional-dependencies]
download = [
    "mlx-lm>=0.31",
]
openai = [
    "fastapi>=0.110",
    "tokenizers>=0.15",
    "uvicorn[standard]>=0.29",
]

[tool.maturin]
manifest-path = "crates/ax-engine-py/Cargo.toml"
python-source = "python"
module-name = "ax_engine._ax_engine"
features = ["python-extension"]
