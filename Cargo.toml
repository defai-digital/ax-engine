[workspace]
members = [
    "crates/ax-bench",
    "crates/ax-engine-core",
    "crates/ax-engine-mlx",
    "crates/ax-engine-py",
    "crates/ax-engine-sdk",
    "crates/ax-engine-server",
    "crates/mlx-sys",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT"
version = "4.0.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[workspace.lints.rust]
unsafe_code = "forbid"
