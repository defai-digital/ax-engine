[workspace]
members = [
    "crates/ax-engine-bench",
    "crates/ax-engine-core",
    "crates/ax-engine-mlx",
    "crates/ax-engine-py",
    "crates/ax-engine-sdk",
    "crates/ax-engine-server",
    "crates/ax-engine-tui",
    "crates/mlx-sys",
]
resolver = "2"

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
version = "4.8.0"

[workspace.dependencies]
fs2 = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
wait-timeout = "0.2"

[workspace.lints.rust]
unsafe_code = "forbid"

[profile.release]
lto = "thin"          # cross-crate inlining without full fat-LTO compile penalty
codegen-units = 1     # single codegen unit lets the optimizer see the full crate graph
panic = "abort"       # omit unwinding tables; saves binary size and a branch per call-site
strip = "debuginfo"   # strip DWARF; keep symbol table for Instruments / cargo-flamegraph
