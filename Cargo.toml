[workspace]
resolver = "2"
members = [
    "crates/ax-engine-core",
    "crates/ax-engine-metal",
    "crates/ax-engine-cli",
    "crates/ax-engine-server",
    "crates/ax-engine-sdk",
    "crates/ax-engine-shim",
    "crates/ax-engine-bench",
]
# ax-engine-py is a cdylib built via `maturin build`, not `cargo build`.
# It uses pyo3 extension-module which deliberately leaves Python symbols
# unresolved at link time, so including it in the workspace breaks
# `cargo build --workspace`.
exclude = ["crates/ax-engine-py"]

[workspace.package]
version = "3.0.0"
edition = "2024"
rust-version = "1.88"
license = "MPL-2.0"
authors = ["DEFAI Private Limited <enquiry@defai.digital>"]
repository = "https://github.com/defai-digital/ax-engine"

[workspace.dependencies]
# Internal crates
ax-engine-core = { path = "crates/ax-engine-core" }
ax-engine-sdk = { path = "crates/ax-engine-sdk" }
ax-engine-metal = { path = "crates/ax-engine-metal" }
ax-engine-shim = { path = "crates/ax-engine-shim" }
ax-engine-bench = { path = "crates/ax-engine-bench" }

# Memory & I/O
memmap2 = "0.9"
byteorder = "1"
half = { version = "2", features = ["num-traits"] }

# Parallelism
rayon = "1"

# Metal (optional)
objc2 = "0.6"
objc2-metal = "0.3"
objc2-foundation = "0.3"
block2 = "0.6"

# CLI
clap = { version = "4", features = ["derive"] }
axum = { version = "0.8", features = ["json", "macros"] }
tokio = { version = "1", features = ["macros", "rt", "signal", "net", "sync"] }
tokio-stream = "0.1"

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Bench
criterion = { version = "0.5", features = ["html_reports"] }

# Testing
rstest = "0.24"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }

# Error handling
anyhow = "1"
thiserror = "2"

# Python bindings
pyo3 = { version = "0.24", features = ["extension-module"] }

# Fast hashing
rustc-hash = "2"

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
