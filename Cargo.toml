[workspace]
resolver = "2"
members = [
    "crates/ax-engine-core",
    "crates/ax-engine-metal",
    "crates/ax-engine-cli",
    "crates/ax-engine-server",
    "crates/ax-engine-sdk",
    "crates/ax-engine-bench",
    "crates/ax-engine-py",
]

[workspace.package]
version = "3.2.4"
edition = "2024"
rust-version = "1.88"
license = "Apache-2.0"
authors = ["DEFAI Private Limited <enquiry@defai.digital>"]
repository = "https://github.com/defai-digital/ax-engine"

[workspace.dependencies]
# Internal crates
ax-engine-core = { path = "crates/ax-engine-core" }
ax-engine-sdk = { path = "crates/ax-engine-sdk" }
ax-engine-metal = { path = "crates/ax-engine-metal" }
ax-engine-bench = { path = "crates/ax-engine-bench" }

# Memory & I/O
memmap2 = "0.9"
byteorder = "1"
half = { version = "2", features = ["num-traits"] }

# Parallelism
rayon = "1"

# Metal (optional)
objc2 = "0.6"
objc2-metal = "0.3"
objc2-foundation = "0.3"
block2 = "0.6"

# CLI
clap = { version = "4", features = ["derive"] }

# Server
axum = { version = "0.8", features = ["json", "tokio", "http1"] }
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "sync"] }
tokio-stream = "0.1"
uuid = { version = "1", features = ["v4"] }

# Observability
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Bench
criterion = { version = "0.5", features = ["html_reports"] }

# Testing
rstest = "0.24"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Error handling
anyhow = "1"
thiserror = "2"

# Python bindings
pyo3 = { version = "0.24" }

# Fast hashing
rustc-hash = "2"

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
