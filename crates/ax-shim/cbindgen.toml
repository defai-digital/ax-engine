language = "C"
cpp_compat = true
include_guard = "LLAMA_H"
no_includes = true
sys_includes = ["stdbool.h", "stdint.h"]
style = "type"

header = """/* AX Engine — llama.cpp C API compatibility header
 *
 * Auto-generated by cbindgen from Rust source. Do not edit manually.
 * Provides the same function signatures as llama.cpp's llama.h
 * for drop-in binary compatibility on Apple Silicon M3+.
 */"""

[export]
include = ["LlamaToken", "LlamaModelParams", "LlamaContextParams"]

[export.rename]
"LlamaToken" = "llama_token"
"LlamaModelParams" = "llama_model_params"
"LlamaContextParams" = "llama_context_params"
"LlamaModel" = "llama_model"
"LlamaContext" = "llama_context"

[export.body]
# Opaque types don't need body definitions

[fn]
sort_by = "None"
