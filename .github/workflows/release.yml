name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v4.2.2)"
        required: true

jobs:
  build-and-publish:
    runs-on: macos-14
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out repository at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Ensure stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install MLX C library
        run: brew install mlx-c

      - name: Build release binaries
        run: cargo build --release -p ax-engine-server -p ax-engine-bench

      - name: Package binaries
        id: package
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${TAG#v}"
          ARCHIVE="ax-engine-${TAG}-macos-arm64.tar.gz"
          tar -czf "/tmp/${ARCHIVE}" -C target/release ax-engine-server ax-engine-bench
          SHA256=$(shasum -a 256 "/tmp/${ARCHIVE}" | awk '{print $1}')
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.name }}" \
            "/tmp/${{ steps.package.outputs.archive }}" \
            --repo "${{ github.repository }}" \
            --clobber

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          VERSION="${{ steps.package.outputs.version }}"
          SHA256="${{ steps.package.outputs.sha256 }}"
          ARCHIVE="${{ steps.package.outputs.archive }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ARCHIVE}"

          git config --global credential.helper store
          printf 'https://x-access-token:%s@github.com\n' "${HOMEBREW_TAP_TOKEN}" > ~/.git-credentials
          git clone "https://github.com/defai-digital/homebrew-ax-engine.git" /tmp/tap
          cd /tmp/tap

          git config user.name "Automatosx"
          git config user.email "automatosx@defai.digital"

          sed -i '' \
            -e "s|version \"[^\"]*\"|version \"${VERSION}\"|" \
            -e "s|url \"[^\"]*\"|url \"${DOWNLOAD_URL}\"|" \
            -e "s|sha256 \"[^\"]*\"|sha256 \"${SHA256}\"|" \
            Formula/ax-engine.rb

          git add Formula/ax-engine.rb
          git diff --cached --quiet || git commit -m "chore: update ax-engine to v${VERSION}"
          git push origin main
