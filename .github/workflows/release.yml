# This workflow is retired. Homebrew releases are now published from the local
# machine using scripts/brew-release.sh, which builds on actual Apple Silicon
# hardware and uses the developer's local gh auth instead of a TAP_TOKEN secret.
#
# To publish a release:
#   scripts/brew-release.sh v4.x.y
#   scripts/brew-release.sh v4.x.y --dry-run   # preview only
#
# This file is kept for reference only. The workflow_dispatch trigger is removed
# so it cannot be accidentally re-run from the GitHub Actions UI.

name: Release (retired)

on:
  # Trigger disabled — use scripts/brew-release.sh instead
  workflow_dispatch:
    inputs:
      _disabled:
        description: "This workflow is retired. Use scripts/brew-release.sh on your local machine."
        required: false

jobs:
  retired:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow retired
        run: |
          echo "This release workflow is retired."
          echo "Use scripts/brew-release.sh on your local machine to publish a release."
          exit 1
