name: Publish JS SDK

on:
  workflow_dispatch:
  release:
    types:
      - published

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'ax-engine-js-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: packages/ax-engine-js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Run tests
        run: npm test

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          EXPECTED_TAG="ax-engine-js-v${PACKAGE_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
            echo "release tag must match package version"
            echo "expected: ${EXPECTED_TAG}"
            echo "actual:   ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
