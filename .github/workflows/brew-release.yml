name: Brew Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to update the tap for (e.g. v6.0.1). The signed release must already exist."
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Only needs to read the release assets; the tap push uses HOMEBREW_TAP_TOKEN.
permissions:
  contents: read

env:
  MAIN_REPO: defai-digital/ax-engine
  TAP_REPO: defai-digital/homebrew-ax-engine
  TAP_FORMULA: Formula/ax-engine.rb

jobs:
  update-tap:
    name: Update Homebrew tap formula
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ -z "$TAG" ]]; then
            echo "error: could not determine release tag" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.tag.outputs.tag }}
          # Don't install a global github.com credential helper: it would override the
          # HOMEBREW_TAP_TOKEN embedded in the tap clone URL and make the tap push
          # authenticate as the default Actions identity (403 to the tap repo).
          persist-credentials: false

      - name: Verify tag matches workspace version
        run: |
          python3 - <<'PY'
          import os, pathlib, sys, tomllib

          root = pathlib.Path.cwd()
          tag_version = os.environ["TAG"].removeprefix("v")
          cargo_version = tomllib.loads((root / "Cargo.toml").read_text())["workspace"]["package"]["version"]

          if tag_version != cargo_version:
              print(f"Version mismatch: tag={tag_version}, workspace={cargo_version}", file=sys.stderr)
              raise SystemExit(1)
          print(f"Version verified: {tag_version}")
          PY
        env:
          TAG: ${{ steps.tag.outputs.tag }}

      - name: Resolve checksum from the signed release asset
        id: asset
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"
          ARCHIVE="ax-engine-${TAG}-macos-arm64.tar.gz"
          DOWNLOAD_URL="https://github.com/${MAIN_REPO}/releases/download/${TAG}/${ARCHIVE}"

          # The signed binary release is produced by scripts/publish-github-release.sh,
          # which uploads the tarball, its minisign signature, and a .sha256 sidecar.
          # We read that authoritative checksum here instead of rebuilding the tarball,
          # so the tap formula always points at the exact signed artifact (and we never
          # clobber it). The tag push can trigger this job before the assets finish
          # uploading, so poll for the sidecar.
          for attempt in $(seq 1 30); do
            if gh release download "$TAG" --repo "$MAIN_REPO" \
                 --pattern "${ARCHIVE}.sha256" --dir /tmp --clobber 2>/dev/null; then
              break
            fi
            echo "waiting for ${ARCHIVE}.sha256 on release $TAG (attempt ${attempt}/30)..."
            sleep 10
          done

          if [[ ! -f "/tmp/${ARCHIVE}.sha256" ]]; then
            echo "error: ${ARCHIVE}.sha256 not found on release $TAG after waiting." >&2
            echo "The signed release must be published first (scripts/publish-github-release.sh)." >&2
            exit 1
          fi

          SHA256="$(awk '{print $1}' "/tmp/${ARCHIVE}.sha256")"
          if [[ ! "$SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "error: could not parse a sha256 from the sidecar: '${SHA256}'" >&2
            exit 1
          fi

          echo "archive=$ARCHIVE"           >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"             >> "$GITHUB_OUTPUT"
          echo "download_url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "Resolved checksum from signed release asset: $SHA256"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap formula
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          SHA256="${{ steps.asset.outputs.sha256 }}"
          DOWNLOAD_URL="${{ steps.asset.outputs.download_url }}"

          TAP_DIR="$(mktemp -d /tmp/ax-engine-tap.XXXXXX)"
          trap 'rm -rf "$TAP_DIR"' EXIT

          git clone \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" \
            --depth=1 --quiet \
            "$TAP_DIR"

          cd "$TAP_DIR"
          git config user.name  "Automatosx"
          git config user.email "automatosx@defai.digital"

          FORMULA_PATH="$TAP_DIR/$TAP_FORMULA"
          if [[ ! -f "$FORMULA_PATH" ]]; then
            echo "error: $TAP_FORMULA not found in tap" >&2
            exit 1
          fi

          # GNU sed (ubuntu runner): in-place edit without the BSD '' backup arg.
          sed -i \
            -e "s|version \"[^\"]*\"|version \"${VERSION}\"|" \
            -e "s|url \"[^\"]*\"|url \"${DOWNLOAD_URL}\"|" \
            -e "s|sha256 \"[^\"]*\"|sha256 \"${SHA256}\"|" \
            "$FORMULA_PATH"

          # Verify all three substitutions landed
          for pattern in "version \"${VERSION}\"" "url \"${DOWNLOAD_URL}\"" "sha256 \"${SHA256}\""; do
            if ! grep -qF "$pattern" "$FORMULA_PATH"; then
              echo "error: formula update failed — pattern not found: $pattern" >&2
              exit 1
            fi
          done

          ruby -c "$FORMULA_PATH" > /dev/null
          echo "Formula syntax OK"

          git add "$TAP_FORMULA"
          if git diff --cached --quiet; then
            echo "Formula already up to date — nothing to commit"
            exit 0
          fi

          echo "Formula diff:"
          git diff --cached "$TAP_FORMULA"

          git commit -m "chore: update ax-engine to ${TAG}"
          git push origin main
          echo "Tap updated: ${TAP_REPO}"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Step summary
        if: always()
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          SHA256="${{ steps.asset.outputs.sha256 }}"
          ARCHIVE="${{ steps.asset.outputs.archive }}"
          DOWNLOAD_URL="${{ steps.asset.outputs.download_url }}"

          {
            echo "## Brew Release: ${TAG}"
            echo
            echo "Tap formula updated to point at the signed release asset (not rebuilt)."
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Archive | \`${ARCHIVE}\` |"
            echo "| SHA256 | \`${SHA256}\` |"
            echo "| Download | ${DOWNLOAD_URL} |"
            echo "| Tap | \`${TAP_FORMULA}\` in \`${TAP_REPO}\` |"
            echo
            echo "\`\`\`"
            echo "brew tap defai-digital/ax-engine"
            echo "brew install defai-digital/ax-engine/ax-engine"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
