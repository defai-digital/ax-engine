name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      mlx_model_artifacts_dir:
        description: Optional path to mounted MLX model artifacts for real-model smoke checks.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AX_ALLOW_UNSUPPORTED_HOST: "1"

jobs:
  rust:
    name: Rust
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        run: bash scripts/install-native-build-deps.sh

      - name: Verify version consistency
        run: python3 scripts/check_version_sync.py

      - name: Check formatting
        run: cargo fmt --check

      - name: Run workspace tests
        run: cargo test --quiet --no-fail-fast

      - name: Run workspace clippy
        # ADR-001 restriction lints are warn-first: --force-warn keeps them
        # visible without letting -D warnings escalate them to errors.
        run: >-
          cargo clippy --all-targets --all-features -- -D warnings
          --force-warn clippy::unwrap-used
          --force-warn clippy::expect-used
          --force-warn clippy::panic
          --force-warn clippy::dbg-macro
          --force-warn clippy::large-enum-variant

      - name: Run cargo-deny supply chain audit
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: advisories licenses bans sources

      - name: Run cargo-audit advisory check
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  scripts:
    name: Scripts and Bench Smoke
    runs-on: macos-14
    timeout-minutes: 25
    env:
      AX_CI_LOG_DIR: ${{ github.workspace }}/ax-ci-logs

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        run: bash scripts/install-native-build-deps.sh

      - name: Install Python script dependencies
        run: pip install httpx

      - name: Prepare CI log directory
        run: mkdir -p "$AX_CI_LOG_DIR"

      - name: Run script hygiene smoke check
        run: |
          set -o pipefail
          bash scripts/check-scripts.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-scripts.log"

      - name: Run benchmark doctor smoke check
        run: |
          set -o pipefail
          bash scripts/check-bench-doctor.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-doctor.log"

      - name: Run Metal kernel contract smoke check
        run: |
          set -o pipefail
          bash scripts/check-metal-kernel-contract.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-metal-kernel-contract.log"

      - name: Run benchmark preview smoke check
        run: |
          set -o pipefail
          bash scripts/check-bench-preview.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-preview.log"

      - name: Upload script smoke logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-script-smoke-logs
          path: ${{ github.workspace }}/ax-ci-logs
          if-no-files-found: ignore

  python-package:
    name: Python Package
    runs-on: macos-14
    timeout-minutes: 20
    env:
      AX_CI_LOG_DIR: ${{ github.workspace }}/ax-ci-logs

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        run: bash scripts/install-native-build-deps.sh

      - name: Prepare CI log directory
        run: mkdir -p "$AX_CI_LOG_DIR"

      - name: Run Python packaging smoke check
        run: |
          set -o pipefail
          bash scripts/check-python-preview.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-python-package.log"

      - name: Upload Python package smoke logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-python-package-logs
          path: ${{ github.workspace }}/ax-ci-logs
          if-no-files-found: ignore

  sdk-clients:
    name: SDK Clients
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: sdk/go/axengine/go.mod

      - name: Run JavaScript SDK tests
        working-directory: sdk/javascript
        run: |
          npm install --no-package-lock
          npm run test:all

      - name: Run Go SDK tests
        working-directory: sdk/go/axengine
        run: go test ./...

      - name: Run Ruby SDK tests
        working-directory: sdk/ruby
        run: ruby -Ilib -Itest test/test_sse_reader.rb test/test_client.rb

      - name: Run Swift SDK tests
        working-directory: sdk/swift
        run: swift test

  model-smoke:
    name: Model Smoke
    runs-on: macos-14
    timeout-minutes: 45
    env:
      AX_CI_LOG_DIR: ${{ github.workspace }}/ax-ci-logs
      AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR: ${{ inputs.mlx_model_artifacts_dir || vars.AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR }}
      AX_MODEL_SMOKE_REQUIRED: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')) || (github.event_name == 'workflow_dispatch' && inputs.mlx_model_artifacts_dir != '') || vars.AX_REQUIRE_MODEL_SMOKE == '1' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Detect MLX model artifacts
        id: mlx-artifacts
        run: |
          if [ -n "${AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR:-}" ] && [ -d "$AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR" ]; then
            echo "available=true" >>"$GITHUB_OUTPUT"
            echo "MLX model artifacts found at $AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR"
            {
              echo "## Model Smoke"
              echo
              echo "MLX model artifacts: available"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=false" >>"$GITHUB_OUTPUT"
            if [[ "$AX_MODEL_SMOKE_REQUIRED" == "true" ]]; then
              echo "MLX model artifacts are required for this ref/event but were not mounted." >&2
              {
                echo "## Model Smoke"
                echo
                echo "MLX model artifacts: missing"
                echo
                echo "Real-model smoke checks are required for this ref/event."
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1
            fi
            echo "MLX model artifacts not mounted; skipping optional real-model smoke checks."
            {
              echo "## Model Smoke"
              echo
              echo "MLX model artifacts: not mounted, optional model-dependent smoke checks skipped."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Python
        if: steps.mlx-artifacts.outputs.available == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: bash scripts/install-native-build-deps.sh

      - name: Prepare CI log directory
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: mkdir -p "$AX_CI_LOG_DIR"

      - name: Run server preview smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-server-preview.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-server-preview.log"

      - name: Run frozen matrix benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-matrix.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-matrix.log"

      - name: Run matrix compare benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-matrix-compare.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-matrix-compare.log"

      - name: Run trusted baseline benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-baseline.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-baseline.log"

      - name: Run replay benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-replay.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-replay.log"

      - name: Run prefix-reuse equivalence regression gate
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-prefix-reuse-equivalence.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-prefix-reuse-equivalence.log"

      - name: Upload model smoke logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ci-model-smoke-logs
          path: ${{ github.workspace }}/ax-ci-logs
          if-no-files-found: ignore

  ci:
    name: CI
    runs-on: ubuntu-latest
    needs:
      - rust
      - scripts
      - python-package
      - sdk-clients
      - model-smoke
    if: always()

    steps:
      - name: Fail if any CI gate failed, cancelled, or skipped
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}
        run: |
          echo "One or more CI gates failed, were cancelled, or were skipped."
          exit 1

      - name: Report CI gate status
        run: |
          echo "All CI gates passed."
          {
            echo "## CI Summary"
            echo
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Rust | ${{ needs.rust.result }} |"
            echo "| Scripts & Bench Smoke | ${{ needs.scripts.result }} |"
            echo "| Python Package | ${{ needs.python-package.result }} |"
            echo "| SDK Clients | ${{ needs.sdk-clients.result }} |"
            echo "| Model Smoke | ${{ needs.model-smoke.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"
