name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      mlx_model_artifacts_dir:
        description: Optional path to mounted MLX model artifacts for real-model smoke checks.
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AX_ALLOW_UNSUPPORTED_HOST: "1"

jobs:
  rust:
    name: Rust
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Ensure stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        run: brew install mlx-c protobuf

      - name: Check formatting
        run: cargo fmt --check

      - name: Run workspace tests
        run: cargo test --quiet --no-fail-fast

      - name: Run workspace clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  scripts:
    name: Scripts and Bench Smoke
    runs-on: macos-14
    timeout-minutes: 25
    env:
      AX_CI_LOG_DIR: ${{ runner.temp }}/ax-ci-logs

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Ensure stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        run: brew install mlx-c protobuf

      - name: Prepare CI log directory
        run: mkdir -p "$AX_CI_LOG_DIR"

      - name: Run script hygiene smoke check
        run: |
          set -o pipefail
          bash scripts/check-scripts.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-scripts.log"

      - name: Run benchmark doctor smoke check
        run: |
          set -o pipefail
          bash scripts/check-bench-doctor.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-doctor.log"

      - name: Run Metal kernel contract smoke check
        run: |
          set -o pipefail
          bash scripts/check-metal-kernel-contract.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-metal-kernel-contract.log"

      - name: Run benchmark preview smoke check
        run: |
          set -o pipefail
          bash scripts/check-bench-preview.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-preview.log"

      - name: Upload script smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-script-smoke-logs
          path: ${{ runner.temp }}/ax-ci-logs
          if-no-files-found: ignore

  python-package:
    name: Python Package
    runs-on: macos-14
    timeout-minutes: 20
    env:
      AX_CI_LOG_DIR: ${{ runner.temp }}/ax-ci-logs

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Ensure stable Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        run: brew install mlx-c protobuf

      - name: Prepare CI log directory
        run: mkdir -p "$AX_CI_LOG_DIR"

      - name: Run Python packaging smoke check
        run: |
          set -o pipefail
          bash scripts/check-python-preview.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-python-package.log"

      - name: Upload Python package smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-python-package-logs
          path: ${{ runner.temp }}/ax-ci-logs
          if-no-files-found: ignore

  sdk-clients:
    name: SDK Clients
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache-dependency-path: sdk/go/axengine/go.mod

      - name: Run JavaScript SDK tests
        working-directory: javascript/ax-engine
        run: npm test

      - name: Run Go SDK tests
        working-directory: sdk/go/axengine
        run: go test ./...

      - name: Run Ruby SDK tests
        working-directory: sdk/ruby
        run: ruby -Ilib -Itest test/test_sse_reader.rb test/test_client.rb

      - name: Run Swift SDK tests
        working-directory: sdk/swift
        run: swift test

  model-smoke:
    name: Model Smoke
    runs-on: macos-14
    timeout-minutes: 45
    env:
      AX_CI_LOG_DIR: ${{ runner.temp }}/ax-ci-logs
      AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR: ${{ inputs.mlx_model_artifacts_dir || vars.AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Detect MLX model artifacts
        id: mlx-artifacts
        run: |
          if [ -n "${AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR:-}" ] && [ -d "$AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR" ]; then
            echo "available=true" >>"$GITHUB_OUTPUT"
            echo "MLX model artifacts found at $AX_ENGINE_MLX_MODEL_ARTIFACTS_DIR"
            {
              echo "## Model Smoke"
              echo
              echo "MLX model artifacts: available"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "available=false" >>"$GITHUB_OUTPUT"
            echo "MLX model artifacts not mounted; skipping real-model smoke checks."
            {
              echo "## Model Smoke"
              echo
              echo "MLX model artifacts: not mounted, model-dependent smoke checks skipped."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Python
        if: steps.mlx-artifacts.outputs.available == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Ensure stable Rust toolchain
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust build artifacts
        if: steps.mlx-artifacts.outputs.available == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install native build dependencies
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: brew install mlx-c protobuf

      - name: Prepare CI log directory
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: mkdir -p "$AX_CI_LOG_DIR"

      - name: Run server preview smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-server-preview.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-server-preview.log"

      - name: Run frozen matrix benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-matrix.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-matrix.log"

      - name: Run matrix compare benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-matrix-compare.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-matrix-compare.log"

      - name: Run trusted baseline benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-baseline.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-baseline.log"

      - name: Run replay benchmark smoke check
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-bench-replay.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-bench-replay.log"

      - name: Run prefix-reuse equivalence regression gate
        if: steps.mlx-artifacts.outputs.available == 'true'
        run: |
          set -o pipefail
          bash scripts/check-prefix-reuse-equivalence.sh 2>&1 | tee "$AX_CI_LOG_DIR/check-prefix-reuse-equivalence.log"

      - name: Upload model smoke logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-model-smoke-logs
          path: ${{ runner.temp }}/ax-ci-logs
          if-no-files-found: ignore
