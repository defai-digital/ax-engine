  <text x="421" y="338" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#166534">best: MTP</text>

  <rect x="624" y="96" width="16" height="16" rx="2" fill="#7c3aed" fill-opacity="0.74"/>
  <text x="648" y="108" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#111827">MTP</text>
