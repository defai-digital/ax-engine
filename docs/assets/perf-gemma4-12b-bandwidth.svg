<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" role="img" aria-labelledby="title desc">
<title>Gemma 4 12B - Memory bandwidth share · AX Engine v6.5.2</title>
<desc>100% stacked bars showing effective bandwidth used versus theoretical headroom for Gemma 4 12B decode. AX 8-bit FFN uses 86%, AX 4-bit FFN 75%, llama.cpp depth 0 76%, and llama.cpp depth 512 75% of the 577 GB/s M5 Max peak.</desc>
