<text x="474.2" y="212.5" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#111827">80%</text>
<text x="540" y="212.5" text-anchor="start" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">459 GB/s · 68.1 tok/s</text>
