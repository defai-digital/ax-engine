<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
<title>Gemma 4 12B — Memory Bandwidth Utilization</title>
<desc>Horizontal bar chart showing the percentage of M5 Max GPU peak memory bandwidth (577 GB/s) consumed per decode token for four engine/quantization configurations of Gemma 4 12B. AX 8-bit FFN reaches 86%, AX 4-bit FFN 80%, llama.cpp depth-0 77%, llama.cpp depth-512 72%.</desc>
<rect width="720" height="280" fill="#f8fafc"/>
<text x="10" y="22" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#111827">Gemma 4 12B — Memory Bandwidth Utilization</text>
<text x="710" y="22" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151">Higher is better</text>
<text x="10" y="40" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#4b5563">% of M5 Max GPU peak (577 GB/s) · decode is bandwidth-bound · each tok reads weights once</text>
<text x="10" y="54" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">AX Engine v6.0.1 · llama.cpp b9430 · M5 Max · peak measured via MLX reduction probe</text>
<rect x="226" y="72" width="304" height="156" rx="4" fill="#ffffff" stroke="#dbe3ef"/>
<line x1="226.0" y1="72" x2="226.0" y2="228" stroke="#e5e7eb" stroke-width="1"/>
<text x="226.0" y="242" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">0%</text>
<line x1="302.0" y1="72" x2="302.0" y2="228" stroke="#e5e7eb" stroke-width="1"/>
<text x="302.0" y="242" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">25%</text>
<line x1="378.0" y1="72" x2="378.0" y2="228" stroke="#e5e7eb" stroke-width="1"/>
<text x="378.0" y="242" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">50%</text>
<line x1="454.0" y1="72" x2="454.0" y2="228" stroke="#e5e7eb" stroke-width="1"/>
<text x="454.0" y="242" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">75%</text>
<line x1="530.0" y1="72" x2="530.0" y2="228" stroke="#e5e7eb" stroke-width="1"/>
<text x="530.0" y="242" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">100%</text>
<line x1="487.4" y1="72" x2="487.4" y2="228" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="1 4" stroke-linecap="round"/>
<text x="483.4" y="66" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626">highest: 86%</text>
<text x="218" y="95.5" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#374151">llama.cpp — depth 0 (tg)</text>
<rect x="226" y="80.5" width="234.1" height="22" rx="3" fill="#f97316" fill-opacity="0.26" stroke="#c2410c" stroke-width="1.6"/>
