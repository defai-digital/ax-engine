<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="492" viewBox="0 0 1080 492" role="img" aria-labelledby="title desc">
<title id="title">AX MTP decode throughput with and without MTP</title>
<desc id="desc">Horizontal grouped bar chart comparing AX direct decode throughput with MTP off against AX MTP decode throughput with MTP on for each supported 6-bit AX MTP package and prompt suite. The winning throughput label in each row is red.</desc>
