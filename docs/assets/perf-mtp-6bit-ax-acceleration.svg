<text x="72" y="54" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12" fill="#4b5563">Each row compares the same prepared 6-bit package and prompt suite: AX direct has MTP off; AX MTP has MTP on.</text>
<text x="1008" y="54" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#374151">Decode throughput, tok/s</text>
