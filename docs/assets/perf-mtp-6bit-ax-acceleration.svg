<title id="title">AX MTP decode throughput with and without MTP</title>
<desc id="desc">Horizontal grouped bar chart comparing AX direct decode throughput with MTP off against AX MTP decode throughput with MTP on for each supported 6-bit MTP model and prompt suite. Labels show the resulting same-package speedup.</desc>
