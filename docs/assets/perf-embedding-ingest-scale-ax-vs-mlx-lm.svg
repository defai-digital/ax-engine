<svg xmlns="http://www.w3.org/2000/svg" width="800" height="430" viewBox="0 0 800 430" role="img" aria-labelledby="title desc"><title>Qwen3 embedding ingest scale</title><desc>Grouped by model | box=IQR | whiskers=min/max | dots=six chunk/batch shapes. Box plots show AX Engine throughput percentage difference versus mlx-lm; zero means reference parity.</desc><rect width="800" height="430" fill="#f8fafc"/><text x="64" y="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#111827">Qwen3 embedding ingest scale</text><text x="64" y="46" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#4b5563">Grouped by model | box=IQR | whiskers=min/max | dots=six chunk/batch shapes.</text><text x="64" y="62" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">Source: 2026-07-03 Qwen same-session paired refresh</text><rect x="718" y="13" width="48" height="22" rx="11" fill="#eef2ff" stroke="#c7d2fe"/><text x="742.0" y="28" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#3730a3">%</text><text x="766" y="52" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626">Higher AX delta is better</text><rect x="64" y="86" width="576" height="230" rx="6" fill="#ffffff" stroke="#dbe3ef"/><line x1="64" y1="316.0" x2="640" y2="316.0" stroke="#e5e7eb" stroke-width="1"/><text x="56" y="319.0" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#6b7280">-3%</text><line x1="64" y1="258.5" x2="640" y2="258.5" stroke="#e5e7eb" stroke-width="1"/><text x="56" y="261.5" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#6b7280">-1.5%</text><line x1="64" y1="201.0" x2="640" y2="201.0" stroke="#94a3b8" stroke-width="1.6"/><text x="56" y="204.0" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#6b7280">0%</text><line