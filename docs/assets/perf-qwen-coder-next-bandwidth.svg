<svg xmlns="http://www.w3.org/2000/svg" width="840" height="470" viewBox="0 0 840 470" role="img" aria-labelledby="title desc">
<title>Qwen3-Coder-Next 4-bit — MoE Decode Efficiency: speed = bandwidth ÷ bytes/token</title>
<desc>Scatter plot of Qwen3-Coder-Next 4-bit MoE decode. X axis is weight bytes read per token, Y axis is decode tok/s; the curve is the 577 GB/s bandwidth ceiling (tok/s = 577 / bytes). AX and mlx-lm share x = 1.96 GB/token (identical MLX weights) so the vertical gap between them is kernel efficiency: AX 108.2 tok/s vs mlx-lm 99.2 tok/s. llama.cpp reads 2.83 GB/token (1.44x more, Q4_K_M) and decodes slowest at 85.5 tok/s. All three sit far below the ceiling, so decode is gather-bound, not bandwidth-bound.</desc>
<rect width="840" height="470" fill="#f8fafc"/>
<text x="20" y="28" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#111827">Qwen3-Coder-Next 4-bit — MoE Decode Efficiency: speed = bandwidth ÷ bytes/token</text>
<text x="20" y="48" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#4b5563">decode throughput vs weight bytes read per token · the curve is the 577 GB/s M5 Max bandwidth ceiling</text>
<text x="20" y="64" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">every engine sits far below the ceiling — MoE decode is gather/dispatch-bound, not bandwidth-bound; the room above each point is headroom</text>
