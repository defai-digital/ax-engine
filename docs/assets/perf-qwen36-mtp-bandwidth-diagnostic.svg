<text x="567.2" y="454" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">125%</text>
<line x1="631.5" y1="78" x2="631.5" y2="434" stroke="#e5e7eb" stroke-width="1"/>
