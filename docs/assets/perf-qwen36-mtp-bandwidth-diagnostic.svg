<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="345" viewBox="0 0 1280 345" role="img" aria-labelledby="title desc">
<title>Qwen3.6 27B MTP same-sidecar output-work diagnostic</title>
<desc>Same-sidecar output-work diagnostic comparing AX Engine, MTPLX, and lightning-mlx on Qwen3.6 27B 4-bit MTP.</desc>
<rect width="1280" height="345" fill="#f8fafc"/>
<text id="title" x="44" y="28" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#111827">Qwen3.6 27B MTP - Same-sidecar output work (2026-07-09)</text>
<text id="desc" x="44" y="50" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#4b5563">All engines use the same dense 27B sidecar, so active bytes match and output work tracks decode speed.</text>
<text x="44" y="68" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">Output work = decode tok/s × 16.90 GB/token; percentages are output-scaled against the 577 GB/s reference.</text>
<rect x="260" y="96" width="460" height="142" rx="5" fill="#ffffff" stroke="#dbe3ef"/>
<text x="720" y="79" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" fill="#dc2626">Higher output work is better here</text>
<text x="760" y="113" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151">Output work</text>
<text x="882" y="113" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151">Decode</text>
<text x="982" y="113" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#374151">Active bytes</text>
<line x1="260.0" y1="96" x2="260.0" y2="238" stroke="#e5e7eb" stroke-width="1"/>
<text x="260.0" y="258" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">0%</text>
<line x1="375.0" y1="96" x2="375.0" y2="238" stroke="#e5e7eb" stroke-width="1"/>
<text x="375.0" y="258" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">50%</text>
<line x1="490.0" y1="96" x2="490.0" y2="238" stroke="#e5e7eb" stroke-width="1"/>
<text x="490.0" y="258" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">100%</text>
<line x1="605.0" y1="96" x2="605.0" y2="238" stroke="#e5e7eb" stroke-width="1"/>
<text x="605.0" y="258" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">150%</text>
<line x1="720.0" y1="96" x2="720.0" y2="238" stroke="#e5e7eb" stroke-width="1"/>
<text x="720.0" y="258" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">200%</text>
<line x1="490.0" y1="96" x2="490.0" y2="238" stroke="#dc2626" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="495.0" y="116" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" font-weight="700" fill="#dc2626">100% physical reference</text>
<text x="248" y="140" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#374151">AX Engine</text>
<rect x="260" y="124" width="424.5" height="22" rx="4" fill="#2eaf5f" fill-opacity="0.82"/>
<line x1="684.5" y1="124" x2="684.5" y2="146" stroke="#176c37" stroke-width="1.4"/>
<text x="676.5" y="140" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#ffffff">185%</text>
<text x="760" y="140" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#dc2626">1065 GB/s</text>
<text x="882" y="140" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">63.0 tok/s</text>
<text x="982" y="140" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">16.90 GB/token</text>
<text x="248" y="174" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#374151">MTPLX</text>
<rect x="260" y="158" width="394.0" height="22" rx="4" fill="#f2b705" fill-opacity="0.82"/>
<line x1="654.0" y1="158" x2="654.0" y2="180" stroke="#9a6a00" stroke-width="1.4"/>
<text x="646.0" y="174" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#ffffff">171%</text>
<text x="760" y="174" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="400" fill="#374151">988 GB/s</text>
<text x="882" y="174" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">58.5 tok/s</text>
<text x="982" y="174" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">16.90 GB/token</text>
<text x="248" y="208" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#374151">lightning-mlx</text>
<rect x="260" y="192" width="375.3" height="22" rx="4" fill="#2563eb" fill-opacity="0.82"/>
<line x1="635.3" y1="192" x2="635.3" y2="214" stroke="#1d4ed8" stroke-width="1.4"/>
<text x="627.3" y="208" text-anchor="end" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="700" fill="#ffffff">163%</text>
<text x="760" y="208" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" font-weight="400" fill="#374151">942 GB/s</text>
<text x="882" y="208" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">55.7 tok/s</text>
<text x="982" y="208" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">16.90 GB/token</text>
<rect x="44" y="273" width="10" height="10" rx="2" fill="#2eaf5f" fill-opacity="0.82" stroke="#176c37"/>
<text x="58" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#374151">AX Engine</text>
<rect x="174" y="273" width="10" height="10" rx="2" fill="#f2b705" fill-opacity="0.82" stroke="#9a6a00"/>
<text x="188" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#374151">MTPLX</text>
<rect x="304" y="273" width="10" height="10" rx="2" fill="#2563eb" fill-opacity="0.82" stroke="#1d4ed8"/>
<text x="318" y="282" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#374151">lightning-mlx</text>
<text x="44" y="308" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="9" fill="#9ca3af">Percentages can exceed 100% because MTP can commit multiple output tokens per target verifier pass.</text>
</svg>
