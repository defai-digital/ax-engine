<svg xmlns="http://www.w3.org/2000/svg" width="980" height="540" viewBox="0 0 980 540" role="img" aria-labelledby="title desc">
<title>Qwen3.6 MTP effective output bandwidth</title>
<desc>Effective output-bandwidth diagnostic comparing AX Engine, MTPLX, and lightning-mlx on Qwen3.6 27B and 35B-A3B 4-bit MTP rows.</desc>
<rect width="980" height="540" fill="#f8fafc"/>
<text id="title" x="44" y="28" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#111827">Qwen3.6 MTP - Effective output bandwidth (2026-07-09)</text>
<text id="desc" x="44" y="50" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" fill="#4b5563">100% = 577 GB/s M5 Max reference; bars can exceed 100% because this is committed-token output work</text>
<text x="44" y="68" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="10" fill="#6b7280">Same bandwidth-diagnostic style as Gemma 4 12B, but Qwen MTP is an effective output metric, not measured GPU utilization.</text>
