<svg xmlns="http://www.w3.org/2000/svg" width="720" height="400" viewBox="0 0 720 400" role="img" aria-labelledby="title desc">
<title>Gemma 4 12B 4-bit — Direct decode</title>
<desc>Grouped bar chart of median tok/s comparing llama.cpp Metal, AX Engine (native MLX) for Gemma 4 12B 4-bit at 128/512/2048 prompt tokens. mlx_lm is absent because it has no graph for the gemma4_unified architecture. AX Engine v6.5.2 is compared with llama.cpp Metal b9700.</desc>
