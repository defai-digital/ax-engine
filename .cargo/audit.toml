# cargo-audit configuration
# See: https://github.com/rustsec/rustsec/tree/main/cargo-audit
# Rationale: ax-internal/ADR-002-supply-chain-security.md

[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste is transitive through metal/tokenizers and has no safe upgrade
]

[output]
deny = ["warnings"]
quiet = false
